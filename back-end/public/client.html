<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat STOMP WebSocket Test</title>
  <!-- Load STOMP.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    .box { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; }
    input, button { padding: 0.5rem; margin-right: 0.5rem; }
    ul { list-style: none; padding-left: 0; }
    li { background: #eee; margin-bottom: 0.2rem; padding: 0.5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Chat Test Client (STOMP via WebSocket)</h1>
  
  <div class="box">
    <h3>1. Connect</h3>
    <input type="text" id="token" placeholder="Bearer JWT Token..." style="width: 300px;">
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()" disabled id="btnDisconnect">Disconnect</button>
    <span id="status">Disconnected</span>
  </div>

  <div class="box">
    <h1>Public Chats Room</h1>
    <ol id="list-public-rooms">

    </ol>
  </div>

  <div class="box" id="panelSend" style="display:none;">
    <h3>3. Send Message</h3>
    <input type="text" id="destinationRoomId" placeholder="Destination Room ID..." style="width: 200px;">
    <input type="text" id="messageContent" placeholder="Type a message..." style="width: 250px;">
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="box">
    <h3>Messages</h3>
    <ul id="messages"></ul>
  </div>

  <script>
    let stompClient = null;
    let currentSubscription = null;

    function connect() {
      const token = document.getElementById('token').value;

      if (!token) return alert('Please enter a JWT token');

      // The STOMP broker URL (ws:// instead of http://)
      const brokerURL = 'ws://localhost:3000';

      stompClient = new StompJs.Client({
        brokerURL: brokerURL,
        connectHeaders: {
          authorization: token
        },
        debug: function (str) {
          console.log(str);
        },
        reconnectDelay: 0, // Disable auto reconnect for manual testing
        heartbeatIncoming: 0,
        heartbeatOutgoing: 0
      });

      stompClient.onConnect = async function (frame) {
        localStorage.setItem('token', token);
        document.getElementById('status').innerText = 'Connected';
        document.getElementById('status').style.color = 'green';
        document.getElementById('btnDisconnect').disabled = false;
        // document.getElementById('panelSub').style.display = 'block';
        // document.getElementById('panelSend').style.display = 'block';
        await getPublicRooms();
        // console.log('Connected: ' + frame);
      };

      stompClient.onStompError = function (frame) {
        console.error('Broker reported error: ' + frame.headers['message']);
        console.error('Additional details: ' + frame.body);
        alert('Error: ' + frame.headers['message']);
      };

      stompClient.activate();
    }

    function disconnect() {
      if (stompClient !== null) {
        stompClient.deactivate();
      }
      document.getElementById('status').innerText = 'Disconnected';
      document.getElementById('status').style.color = 'black';
      document.getElementById('btnDisconnect').disabled = true;
      document.getElementById('panelSub').style.display = 'none';
      document.getElementById('panelSend').style.display = 'none';
      console.log("Disconnected");
    }

    function subscribeRoom(type) {
      const roomId = document.getElementById('roomId').value;
      if (!roomId) return alert('Enter Room ID to subscribe');

      if (currentSubscription) {
        currentSubscription.unsubscribe();
      }

      const destination = `/topic/rooms.${roomId}`;
      currentSubscription = stompClient.subscribe(destination, function (message) {
        showReceivedMessage(message.body);
      },{
        type:'PUBLIC'
      });
      console.log(`Subscribed to ${destination}`);
      
      // Auto-fill destination room for convenience
      document.getElementById('destinationRoomId').value = roomId;
    }

    function sendMessage() {
      const roomId = document.getElementById('destinationRoomId').value;
      const content = document.getElementById('messageContent').value;

      if (!roomId || !content) return alert('Missing room or content');

      const payload = {
        roomId: roomId,
        content: content
      };

      // Ensure idempotency for retries
      const clientMessageId = crypto.randomUUID();

      stompClient.publish({
        destination: '/app/chat.sendMessage',
        headers: { 'message-id': clientMessageId },
        body: JSON.stringify(payload)
      });
      
      document.getElementById('messageContent').value = '';
    }

    function showReceivedMessage(message) {
      const ul = document.getElementById('messages');
      const li = document.createElement('li');
      
      try {
        const data = JSON.parse(message);
        li.innerText = `[${new Date(data.createdAt).toLocaleTimeString()}] Sender ${data.senderId.substring(0,6)}...: ${data.content}`;
      } catch (e) {
        li.innerText = message;
      }
      
      ul.prepend(li); // add to top
    }

    async function getPublicRooms() {
      const token = localStorage.getItem('token') ?? document.getElementById('token').value;
      const authHeader = token.startsWith('Bearer ') ? token : `Bearer ${token}`;
      await fetch('/rooms/public', {
        headers: {
          'Authorization': authHeader
        }
      })
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById('list-public-rooms');
          list.innerHTML = '';
          data.forEach(room => {
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.innerText = room.name;
            btn.onclick = () => joinRoom(room.id);
            li.appendChild(btn);
            list.appendChild(li);
          });
        })
        .catch(err => console.error('Error fetching public rooms:', err));
    }

    function joinRoom(roomId) {
      document.getElementById('roomId').value = roomId;
      document.getElementById('destinationRoomId').value = roomId;
      document.getElementById('panelSub').style.display = 'block';
      document.getElementById('panelSend').style.display = 'block';
      subscribeRoom();
    }

  </script>
</body>
</html>
