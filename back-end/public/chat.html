<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f4f4f4;
    }

    header {
      background: #4a90d9;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-size: 1.2rem;
    }

    header h2 {
      font-size: 1.1rem;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      list-style: none;
    }

    #messages li {
      background: #fff;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      max-width: 70%;
      align-self: flex-start;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      word-break: break-word;
    }

    #messages li .time {
      font-size: 0.75rem;
      color: #999;
      margin-right: 0.4rem;
    }

    #messages li .sender {
      font-weight: bold;
      color: #4a90d9;
      margin-right: 0.3rem;
    }

    #input-area {
      display: flex;
      padding: 0.75rem 1rem;
      background: #fff;
      border-top: 1px solid #ddd;
      gap: 0.5rem;
    }

    #messageInput {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 1rem;
      outline: none;
    }

    #messageInput:focus {
      border-color: #4a90d9;
    }

    #btnSend {
      padding: 0.6rem 1.2rem;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
    }

    #btnSend:hover {
      background: #357abd;
    }
  </style>
</head>
<body>
  <header>
    <a href="/client.html" title="Back">&#8592;</a>
    <h2 id="room-name">Chat</h2>
  </header>

  <ul id="messages"></ul>

  <div id="input-area">
    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
    <button id="btnSend" onclick="sendMessage()">Send</button>
  </div>

  <script src="./js/chat.js"></script>
</body>
</html>
